<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>COD Manager — Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: hsl(222.2, 84%, 4.9%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Subtle radial glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, hsla(217, 91%, 60%, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: fadeIn 0.6s ease;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: hsla(217, 91%, 60%, 0.12);
            border: 1px solid hsla(217, 91%, 60%, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: hsl(217, 91%, 60%);
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: white;
        }

        .logo-version {
            font-size: 12px;
            color: hsla(0, 0%, 100%, 0.35);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Spinner */
        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: fadeIn 0.6s ease 0.3s both;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2.5px solid hsla(0, 0%, 100%, 0.1);
            border-top-color: hsl(217, 91%, 60%);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .status-text {
            font-size: 13px;
            color: hsla(0, 0%, 100%, 0.45);
            font-weight: 400;
            transition: opacity 0.3s;
        }

        .status-text.connected {
            color: hsl(152, 69%, 50%);
        }

        /* Dots animation */
        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% {
                content: '';
            }

            25% {
                content: '.';
            }

            50% {
                content: '..';
            }

            75% {
                content: '...';
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="6" y1="12" x2="10" y2="12" />
                <line x1="8" y1="10" x2="8" y2="14" />
                <line x1="15" y1="13" x2="15.01" y2="13" />
                <line x1="18" y1="11" x2="18.01" y2="11" />
                <path
                    d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z" />
            </svg>
        </div>
        <div class="logo-text">COD Manager</div>
        <div class="logo-version">v1.0.4</div>
    </div>

    <div class="spinner-container">
        <div class="spinner" id="spinner"></div>
        <div class="status-text" id="status">Starting server<span class="dots"></span></div>
    </div>

    <script>
        const port = new URLSearchParams(location.search).get('port') || '8000';
        const SERVER_URL = `http://127.0.0.1:${port}`;
        let attempts = 0;

        async function checkServer() {
            attempts++;
            try {
                const res = await fetch(SERVER_URL + '/api/config', {
                    signal: AbortSignal.timeout(1500)
                });
                if (res.ok) {
                    // Server is ready!
                    document.getElementById('status').textContent = 'Connected — Loading app...';
                    document.getElementById('status').classList.add('connected');
                    document.getElementById('spinner').style.borderTopColor = 'hsl(152, 69%, 50%)';
                    setTimeout(() => {
                        window.location.href = SERVER_URL;
                    }, 400);
                    return;
                }
            } catch (e) {
                // Server not ready yet
            }

            // Update status after several attempts
            if (attempts > 10) {
                document.getElementById('status').innerHTML =
                    'Server is taking longer than usual<span class="dots"></span>';
            }

            // Retry
            setTimeout(checkServer, 500);
        }

        // Start polling after a brief initial delay
        setTimeout(checkServer, 300);
    </script>
</body>

</html>
